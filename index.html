<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#071827; --bg2:#0B2236; --surface:#0E2A41; --surface2:#143A58;
    --ink:#EAF3FA; --muted:#8FB0C9; --gold:#2F92CF; --gold2:#49A8DE; --gold-deep:#1C6FA6;
    --on-gold:#04121F;
    --line:#1C3E5C; --line2:rgba(73,168,222,.28); --ok:#2AAE79; --err:#E5675F;
    --shadow:0 1px 2px rgba(2,10,20,.5),0 20px 46px rgba(2,12,24,.62);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  .serif{font-family:'Cormorant Garamond',serif}

  header{position:sticky;top:0;z-index:40;background:rgba(12,11,9,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar{max-width:1160px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
  .logo-wrap{display:flex;align-items:center;gap:11px;white-space:nowrap}
  .logo-wrap img{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line2);object-fit:cover}
  .brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:.5px;line-height:1}
  .search{flex:1;position:relative;max-width:420px;margin-left:auto}
  .search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--line);border-radius:100px;background:var(--surface);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
  .search input::placeholder{color:var(--muted)}
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .cart-btn{position:relative;display:flex;align-items:center;gap:7px;padding:11px 16px;background:var(--gold);color:var(--on-gold);border-radius:100px;font-size:13.5px;font-weight:600;white-space:nowrap}
  .cart-btn:hover{background:var(--gold2)}
  @keyframes cartpulse{0%{transform:scale(1)}30%{transform:scale(1.18)}60%{transform:scale(.95)}100%{transform:scale(1)}}
  .cart-btn.pulse{animation:cartpulse .5s ease}
  .install-btn{padding:11px 14px;border:1px solid var(--gold);color:var(--gold);border-radius:100px;font-size:12.5px;font-weight:600;white-space:nowrap;background:transparent}
  .install-btn:hover{background:var(--gold);color:var(--on-gold)}
  .cart-btn .count{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;background:var(--on-gold);color:var(--gold);border-radius:100px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

  .hero{max-width:1160px;margin:0 auto;padding:44px 20px 14px;text-align:center;position:relative}
  .hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:420px;height:240px;max-width:90%;background:radial-gradient(ellipse,rgba(73,168,222,.16),transparent 70%);pointer-events:none}
  .hero-logo{width:118px;height:118px;border-radius:50%;border:2px solid var(--line2);object-fit:cover;margin:0 auto 18px;position:relative;box-shadow:0 0 0 6px rgba(73,168,222,.10)}
  .hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,6vw,52px);color:var(--gold);line-height:1.02;letter-spacing:1px;position:relative}
  .hero p{color:var(--muted);margin-top:8px;font-size:15px;position:relative}
  .socials{display:flex;gap:10px;justify-content:center;margin-top:18px;position:relative}
  .socials a{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--gold);transition:.18s}
  .socials a:hover{background:var(--gold);color:var(--on-gold);border-color:var(--gold);transform:translateY(-2px)}

  .filters{max-width:1160px;margin:0 auto;padding:16px 20px 4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .chip{padding:8px 15px;border:1px solid var(--line);background:var(--surface);border-radius:100px;font-size:13px;font-weight:500;color:var(--ink);transition:all .15s}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold);font-weight:600}
  .filters .sep{width:1px;height:22px;background:var(--line);margin:0 4px}
  .sort{margin-left:auto}
  .sort select{padding:8px 12px;border:1px solid var(--line);border-radius:100px;background:var(--surface);font-size:13px;font-family:inherit;color:var(--ink);outline:none;cursor:pointer}
  .count-line{max-width:1160px;margin:0 auto;padding:14px 20px 0;font-size:13px;color:var(--muted)}

  .grid{max-width:1160px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line2)}
  .thumb{aspect-ratio:1/1;background:var(--surface2);position:relative;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.62);color:var(--ink);font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;letter-spacing:.02em;border:1px solid var(--line2)}
  .fav{position:absolute;top:10px;right:10px;background:var(--gold);color:var(--on-gold);font-size:10px;font-weight:700;padding:4px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em}
  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .card h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;line-height:1.1;margin:2px 0 6px;color:var(--ink)}
  .desc{font-size:12.5px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
  .meta{display:flex;gap:6px;margin:10px 0 12px;flex-wrap:wrap}
  .tag{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 9px;border-radius:100px;border:1px solid var(--line)}
  .row{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .from-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block}
  .price{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;color:var(--gold);line-height:1}
  .promo-flag{position:absolute;top:10px;right:10px;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:4px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em}
  .price-old{font-size:13px;color:var(--muted);text-decoration:line-through;margin-right:6px;font-family:'Inter';font-weight:400}
  .size .old{text-decoration:line-through;opacity:.55;font-size:11px;margin-right:4px}
  .m-price .price-old{font-size:15px}
  .ci-info .p .old{text-decoration:line-through;color:var(--muted);font-size:11px;margin-right:5px}
  .ci-promo{font-size:9.5px;font-weight:700;color:#fff;background:var(--err);padding:2px 6px;border-radius:100px;margin-left:6px;letter-spacing:.03em}
  .promo-line{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ok);padding:5px 0}
  .view{font-size:12.5px;color:var(--gold);font-weight:600;white-space:nowrap;padding-bottom:3px}

  .state{max-width:1160px;margin:0 auto;padding:80px 20px;text-align:center;color:var(--muted)}
  .state .serif{font-size:28px;color:var(--ink);display:block;margin-bottom:6px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.25s;z-index:50}
  .overlay.on{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:var(--bg2);z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.5);border-left:1px solid var(--line)}
  .drawer.on{transform:translateX(0)}
  .drawer-head{padding:20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .drawer-head .serif{font-size:24px;color:var(--gold);flex:1}
  .close{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted)}
  .close:hover{color:var(--ink)}
  .items{flex:1;overflow-y:auto;padding:8px 20px}
  .ci{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .ci-img{width:64px;height:64px;border-radius:10px;background:var(--surface2);object-fit:cover;flex-shrink:0;overflow:hidden}
  .ci-img .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .ci-info{flex:1;min-width:0}
  .ci-info h4{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.1}
  .ci-info .s{font-size:12px;color:var(--muted)}
  .ci-info .p{font-size:14px;font-weight:600;margin-top:2px;color:var(--gold)}
  .qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:100px;overflow:hidden;height:30px}
  .qty button{width:30px;height:30px;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .qty button:hover{background:var(--surface2)}
  .qty span{min-width:24px;text-align:center;font-size:13px;font-weight:600}
  .rm{font-size:11px;color:var(--err);margin-top:6px}
  .drawer-foot{padding:20px;border-top:1px solid var(--line);background:var(--surface)}
  .foot-field{margin-bottom:12px}
  .foot-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  .foot-field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--bg2);color:var(--ink)}
  .foot-field input:focus{border-color:var(--gold)}
  .total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .total .serif{font-size:22px}
  .total b{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold)}
  .wa{width:100%;padding:15px;background:var(--ok);color:#fff;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px}
  .wa:hover{filter:brightness(1.08)}
  .cart-empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .cart-empty .serif{font-size:22px;color:var(--ink);display:block;margin-bottom:4px}

  .modal{position:fixed;inset:0;z-index:70;display:none;align-items:flex-start;justify-content:center;padding:20px;background:rgba(0,0,0,.75);overflow-y:auto}
  .modal.on{display:flex}
  .modal-box{background:var(--bg2);border:1px solid var(--line);border-radius:20px;max-width:520px;width:100%;overflow:hidden;position:relative;margin:auto}
  .m-hero{position:relative;aspect-ratio:1/1;background:var(--surface2)}
  .m-hero img{width:100%;height:100%;object-fit:cover}
  .m-hero .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .m-hero .m-tags{position:absolute;left:16px;bottom:14px;display:flex;gap:6px}
  .m-hero .m-tags .tag{background:rgba(0,0,0,.62);color:var(--ink);border-color:var(--line2)}
  .m-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(23,21,15,.6);border:1px solid var(--line2);font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;z-index:2}
  .m-body{padding:22px}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .m-body h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--ink);line-height:1.05}
  .m-body .m-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .m-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold);white-space:nowrap;text-align:right}
  .m-price small{display:block;font-family:'Inter';font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .m-desc{color:var(--ink);font-size:13.5px;margin:12px 0 4px;opacity:.92;line-height:1.65}
  .m-sizes-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px}
  .sizes{display:flex;flex-wrap:wrap;gap:8px}
  .size{padding:10px 16px;border:1px solid var(--line);background:var(--surface);border-radius:12px;font-size:13.5px;font-weight:500;color:var(--ink);transition:.15s}
  .size:hover{border-color:var(--gold)}
  .size.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold);font-weight:600}
  .m-actions{margin-top:20px;display:flex;flex-direction:column;gap:10px}
  .btn-add{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--on-gold);border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-add:hover{background:linear-gradient(135deg,var(--gold2),var(--gold-deep))}
  .btn-solo{width:100%;padding:14px;background:var(--ok);color:#fff;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-solo:hover{filter:brightness(1.08)}

  footer{border-top:1px solid var(--line);margin-top:20px;padding:36px 20px 40px;text-align:center}
  .foot-logo{width:64px;height:64px;border-radius:50%;border:1px solid var(--line2);object-fit:cover;margin:0 auto 14px}
  footer .fname{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);margin-bottom:14px}
  footer .socials{margin-top:0;margin-bottom:18px}
  footer .adm{color:var(--muted);font-size:12.5px}
  footer .adm a{color:var(--gold)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:var(--on-gold);padding:12px 20px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:90;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:640px){
    .brand{font-size:19px}
    .cart-btn .lbl{display:none}
    .search{order:3;flex-basis:100%;max-width:none;margin-left:0}
    .bar{flex-wrap:wrap}
  }
  .pricemode-wrap{max-width:1160px;margin:0 auto;padding:16px 20px 0;display:flex;flex-direction:column;align-items:center}
  .pricemode{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:100px;padding:4px;gap:4px}
  .pm-btn{padding:9px 22px;border-radius:100px;font-size:13.5px;font-weight:600;color:var(--muted);transition:.15s}
  .pm-btn.on{background:var(--gold);color:var(--on-gold)}
  .size.out{opacity:.45;cursor:not-allowed}
  .mayor-note{margin:0 0 14px;padding:11px 13px;border-radius:12px;font-size:12.5px;font-weight:600;text-align:center;background:var(--surface2);border:1px solid var(--line2);color:var(--ink)}
  .mayor-note.on{background:rgba(42,174,121,.14);border-color:rgba(42,174,121,.55);color:#7fe7bd}
  .mayor-note .bar{height:5px;border-radius:100px;background:rgba(255,255,255,.08);margin-top:9px;overflow:hidden}
  .mayor-note .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s}
  .pm-note{text-align:center;font-size:11.5px;color:var(--muted);margin-top:9px;padding:0 16px;max-width:520px}
  .ladder{max-width:1160px;margin:12px auto 0;padding:10px 16px;text-align:center;font-size:11.5px;color:var(--muted);line-height:1.7;background:var(--surface);border:1px solid var(--line);border-radius:12px}
  #ladderInfo{padding:0 20px}
  .ladder b{color:var(--gold)}
  .cart-tip{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:0 0 8px;font-size:12px;color:var(--ink)}
  .cart-tip.ok{background:rgba(42,174,121,.14);border-color:rgba(42,174,121,.5);color:#7fe7bd}
  .cart-tip span{color:var(--muted)}
  .confirm-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink);margin:2px 0 8px;cursor:pointer}
  .confirm-row input{width:18px;height:18px;accent-color:var(--gold);flex:none}
  .order-msg{font-size:12.5px;margin:0 0 10px;line-height:1.4}
  .order-msg:empty{margin:0}
  .order-msg.ok{color:#7fe7bd}
  .order-msg.err{color:var(--err)}
  .stk-line{font-size:11.5px;color:var(--muted);margin:6px 0 0}
  .stk-line.low{color:#e0a94b;font-weight:600}
  .m-stock{font-size:12px;color:var(--muted);margin:0 0 12px}
  .m-stock.low{color:#e0a94b;font-weight:600}
  .m-stock.out{color:var(--err);font-weight:600}
  .ochips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 14px}
  .ochip{font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:100px;border:1px solid var(--line);background:var(--surface2);color:var(--muted)}
  .ochip small{font-weight:500;opacity:.85}
  .ochip.avail{border-color:var(--gold);color:var(--gold)}
  .ochip.hint{border-color:var(--gold);color:var(--gold)}
  .ochip.on{background:rgba(42,174,121,.16);border-color:rgba(42,174,121,.55);color:#7fe7bd}
  .ochip.off{opacity:.4}
  #offerBar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;align-items:center;gap:8px;max-width:calc(100% - 28px);padding:12px 18px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--on-gold);font-size:12.5px;font-weight:600;box-shadow:0 12px 32px rgba(2,12,24,.55);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #offerBar b{font-weight:800}
  #offerBar .ob-c{font-weight:800}
  @media(min-width:900px){ #offerBar{left:auto;right:24px;transform:none} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#071827">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<header>
  <div class="bar">
    <a class="logo-wrap" href="#top"><img id="logoHeader" alt="Logo" /><span class="brand" id="brand">JC LUXURY STORE</span></a>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Buscar perfume…" autocomplete="off" />
    </div>
    <button id="installBtn" class="install-btn" style="display:none">⇩ Instalar app</button>
    <button class="cart-btn" id="cartBtn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="lbl">Carrito</span><span class="count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</header>

<a id="top"></a>
<section class="hero">
  <img class="hero-logo" id="logoHero" alt="Logo" />
  <h1 id="heroTitle">JC LUXURY STORE</h1>
  <p id="heroTag"></p>
  <div class="socials" id="socialsHero"></div>
</section>

<div class="pricemode-wrap">

function _promosVigentes(PROMOS){
  const hoy=new Date().toISOString().slice(0,10);
  return (PROMOS||[]).filter(p=>p.activo && (!p.desde||hoy>=p.desde) && (!p.hasta||hoy<=p.hasta));
}
function _firstTamano(prod){ const a=(prod.presentaciones||[]).filter(x=>x&&Number(x.precio)>0); return a[0]?a[0].tamano:'Sellado'; }
function _unitPrice(prod,tamano,ctx){
  const pres=(prod.presentaciones||[]).find(x=>x.tamano===tamano)||{};
  const u0=Number(pres.precio)||0; let best=u0, src='';
  const may=Number(pres.precio_may)||0;
  if(ctx.totalUnits>=ctx.MAYOR_MIN && may>0 && may<best){ best=may; src='Precio por mayor'; }
  const esc=(pres.escala||[]);
  (ctx.escalas||[]).forEach(pr=>{
    const c=pr.config||{}; let rel, applies=true;
    if(c.alcance==='producto'){ applies=(c.productos||[]).includes(prod.nombre); rel=ctx.qtyByName[prod.nombre]||0; }
    else rel=ctx.totalUnits;
    if(!applies) return;
    const niveles=(c.niveles&&c.niveles.length)?c.niveles.map(Number):null;
    esc.forEach(t=>{ const m=Number(t.min), p=Number(t.precio)||0; if(p<=0) return; if(niveles&&!niveles.includes(m)) return; if(rel>=m && p<best){ best=p; src='x'+m; } });
  });
  return {u0,best:Math.round(best*100)/100,src};
}
function priceEngine(basket,PRODUCTS,PROMOS,MAYOR_MIN){
  const vig=_promosVigentes(PROMOS);
  const escalas=vig.filter(p=>p.tipo==='cantidad');
  const combos=vig.filter(p=>p.tipo==='combo');
  const totalUnits=basket.reduce((s,i)=>s+Number(i.qty||0),0);
  const qtyByName={}; basket.forEach(i=>{ qtyByName[i.nombre]=(qtyByName[i.nombre]||0)+Number(i.qty||0); });
  const ctx={totalUnits,MAYOR_MIN,escalas,qtyByName};
  const lines=basket.map(it=>{
    const prod=PRODUCTS.find(x=>(it.id&&x.id===it.id)||x.nombre===it.nombre)||{nombre:it.nombre,presentaciones:[]};
    const up=_unitPrice(prod,it.tamano,ctx);
    return {...it,unit:up.best,unitOrig:up.u0,promo:(up.best<up.u0?up.src:''),lineTotal:Math.round(up.best*Number(it.qty||0)*100)/100};
  });
  const comboDisc=[];
  combos.forEach(pr=>{
    const c=pr.config||{}, L=c.productos||[], T=Number(c.precio)||0;
    if(L.length<2||T<=0) return;
    let packs=Infinity; L.forEach(n=>{ packs=Math.min(packs,qtyByName[n]||0); });
    if(!isFinite(packs)) packs=0;
    if(packs>=1){
      let normal=0; L.forEach(n=>{ const p2=PRODUCTS.find(x=>x.nombre===n); if(p2) normal+=_unitPrice(p2,_firstTamano(p2),ctx).best; });
      const per=normal-T;
      if(per>0) comboDisc.push({nombre:pr.nombre,packs,monto:Math.round(per*packs*100)/100});
    }
  });
  const subtotal=Math.round(lines.reduce((s,l)=>s+l.lineTotal,0)*100)/100;
  const totalCombo=Math.round(comboDisc.reduce((s,c)=>s+c.monto,0)*100)/100;
  return {lines,comboDisc,subtotal,total:Math.max(0,Math.round((subtotal-totalCombo)*100)/100),totalUnits,mayor:totalUnits>=MAYOR_MIN,escalas,combos,qtyByName};
}

function stockOf(pr){ const s=pr.stock; return (s===null||s===undefined||s==='')?Infinity:Number(s); }
const STOCK_BAJO = Number(CONFIG.STOCK_BAJO)||5;
function prodStock(p){ const a=presActivas(p); const pr=a[0]; return pr?stockOf(pr):Infinity; }
function stockKey(p){ const st=prodStock(p); if(st<=0) return 9e9; if(!isFinite(st)) return 1e6; return st; }
function modalStock(p){ const st=prodStock(p); if(!isFinite(st)) return ''; if(st<=0) return '<div class="m-stock out">Agotado</div>'; if(st<=STOCK_BAJO) return `<div class="m-stock low">¡Casi agotado! Quedan ${st}</div>`; return `<div class="m-stock">${st} disponibles</div>`; }
function baseOf(pr){ const may=Number(pr.precio_may)||0; return (PRICE_MODE==='may'&&may>0)?may:Number(pr.precio); }
const noimg='<div class="noimg"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2h6l1 3h-8zM7 5h10v3H7zM8 8h8l1 12a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1z"/></svg></div>';

function presActivas(p){
  return (p.presentaciones||[]).filter(x=>x&&x.activo&&Number(x.precio)>0).sort((a,b)=>Number(a.precio)-Number(b.precio));
}

/* ---------- MOTOR DE PROMOCIONES ---------- */
function promosActivas(){
  const hoy=new Date().toISOString().slice(0,10);
  return PROMOS.filter(p=>p.activo && (!p.desde||hoy>=p.desde) && (!p.hasta||hoy<=p.hasta));
}
function tallaOk(cfg,tamano){ return !cfg.tallas||!cfg.tallas.length||cfg.tallas.includes(tamano); }
// precio por unidad aplicando promos de tipo "producto" y "general" (toma el mejor descuento)
function precioUnit(prod,tamano,base){
  let mejor=base, promo=null;
  promosActivas().forEach(pr=>{
    const c=pr.config||{}; let pct=0, ok=false;
    if(pr.tipo==='producto'){ ok=(c.productos||[]).includes(prod.nombre)&&tallaOk(c,tamano); pct=c.pct||0; }
    else if(pr.tipo==='general'){ ok=(c.alcance==='todo'||(c.alcance==='categoria'&&prod.categoria===c.categoria)); pct=c.pct||0; }
    if(ok&&pct>0){ const np=base*(1-pct/100); if(np<mejor){ mejor=np; promo=pr.nombre; } }
  });
  return {precio:Math.round(mejor*100)/100, original:base, promo};
}
// lista de presentaciones activas con su precio efectivo (para catálogo/modal)
function effList(p){ return presActivas(p).map(pr=>({...pr, ...precioUnit(p,pr.tamano,baseOf(pr)), stk:stockOf(pr)})); }
// cálculo del carrito con promos de cantidad y combo
function computeCart(){ return priceEngine(cart,PRODUCTS,PROMOS,MAYOR_MIN); }

async function load(){

function buildFilters(){
  const cats=[...new Set(PRODUCTS.map(p=>p.categoria).filter(Boolean))];

  const cf=document.getElementById('catFilters'); cf.innerHTML='';
  cf.appendChild(makeChip('Todos','todos',()=>{fCat='todos';render()}));
  cats.forEach(c=>cf.appendChild(makeChip(c,c,()=>{fCat=c;render()})));
  const gf=document.getElementById('genFilters'); gf.querySelectorAll('.chip').forEach(e=>e.remove());
  const sep=gf.querySelector('.sep'); const sort=gf.querySelector('.sort');
  if(gens.length) sep.style.display='block';

}
function makeChip(label,val,onClick,dim){ const b=document.createElement('button'); b.className='chip'; b.textContent=label; b.dataset.v=val; if(dim) b.dataset.dim=dim; b.onclick=()=>{onClick();syncChips();}; return b; }
function syncChips(){
  document.querySelectorAll('#catFilters .chip').forEach(c=>c.classList.toggle('on',c.dataset.v===fCat));
  document.querySelectorAll('#genFilters .chip').forEach(c=>{
    const on=c.dataset.dim==='mom'?(c.dataset.v===fMom):(c.dataset.v===fGen);
    c.classList.toggle('on',on);
  });
}

function filtered(){
  let list=PRODUCTS.filter(p=>{
    const okCat=fCat==='todos'||p.categoria===fCat;
    const okGen=fGen==='todos'||p.genero===fGen;
    const okMom=fMom==='todos'||p.momento===fMom;
    const okQ=!q||(p.nombre+' '+(p.marca||'')+' '+(p.descripcion||'')).toLowerCase().includes(q);
    return okCat&&okGen&&okMom&&okQ;
  });
  const s=document.getElementById('sort').value;
  const desde=p=>{ const a=presActivas(p); return a.length?Number(a[0].precio):0; };
  list.sort((a,b)=>{
    if(s==='precio-asc') return desde(a)-desde(b);
    if(s==='precio-desc') return desde(b)-desde(a);
    if(s==='nombre') return a.nombre.localeCompare(b.nombre);
    return stockKey(a)-stockKey(b)||(b.destacado?1:0)-(a.destacado?1:0)||a.nombre.localeCompare(b.nombre);
  });
  return list;
}

function addToCart(p,tamano,stk){

  else cart.push({key,id:p.id,nombre:p.nombre,marca:p.marca,tamano,pu,pm,imagen_url:p.imagen_url,qty:1,stk:(max===Infinity?null:max)});

function notifyMayor(){ const {u,txt}=mayorInfo(); if(u<=0) return; toast(txt.replace('✓ ','')); }
function cartNotices(){
  const r=computeCart(); let h='';
  const mez=r.escalas.filter(p=>(p.config||{}).alcance!=='producto');
  if(mez.length){
    const act=new Set(); mez.forEach(pr=>((pr.config||{}).niveles||ESCALA_MINS_C).forEach(m=>act.add(Number(m))));
    const next=[...act].sort((a,b)=>a-b).find(m=>r.totalUnits<m);

  }

    const c=pr.config||{}; const niveles=(c.niveles||ESCALA_MINS_C).map(Number).sort((a,b)=>a-b);
    (c.productos||[]).forEach(n=>{ const q=r.qtyByName[n]||0; if(!q) return; const nx=niveles.find(m=>q<m); if(nx) h+=`<div class="cart-tip">${esc(n)}: con ${nx-q} más llega al nivel x${nx}</div>`; });
  });

  });

function activeEscalaMins(nombre){

function offerChips(p){

function changeQty(key,d){ const it=cart.find(x=>x.key===key); if(!it) return; const max=(it.stk===undefined||it.stk===null)?Infinity:Number(it.stk); if(d>0&&it.qty+1>max){ toast('Solo hay '+max+' en stock'); return; } it.qty+=d; if(it.qty<=0) cart=cart.filter(x=>x.key!==key); saveCart(); renderCart(); if(d>0){ notifyMayor(); pulseCart(); } }

  const box=document.getElementById('cartItems'); const foot=document.getElementById('cartFoot');
  if(!cart.length){ box.innerHTML='<div class="cart-empty"><span class="serif">Tu pedido está vacío</span>Elige un perfume y su talla.</div>'; foot.style.display='none'; updateOfferBar(); return; }
  foot.style.display='block';
  box.innerHTML=mayorBanner()+cartNotices()+r.lines.map(l=>{
    const img=l.imagen_url?`<img class="ci-img" src="${l.imagen_url}" alt="">`:`<div class="ci-img">${noimg}</div>`;
    const disc=l.unit<l.unitOrig;
    return `<div class="ci">${img}
      <div class="ci-info"><h4>${esc(l.nombre)}</h4>
        <div class="s">${esc(l.marca||'')}${l.tamano&&l.tamano!=='Sellado'?' · '+esc(l.tamano):''}</div>
        <div class="p">${disc?`<span class="old">${money(l.unitOrig*l.qty)}</span>`:''}${money(l.lineTotal)}${l.promo?`<span class="ci-promo">${esc(l.promo)}</span>`:''}</div>
        <button class="rm" onclick="removeItem('${l.key}')">Quitar</button>
      </div>
      <div class="qty"><button onclick="changeQty('${l.key}',-1)">−</button><span>${l.qty}</span><button onclick="changeQty('${l.key}',1)">+</button></div>
    </div>`;
  }).join('') + (r.comboDisc.length?`<div style="padding:10px 0 2px">${r.comboDisc.map(c=>`<div class="promo-line"><span>🎁 ${esc(c.nombre)}</span><span>- ${money(c.monto)}</span></div>`).join('')}</div>`:'');
  document.getElementById('cartTotal').textContent=money(r.total);
  updateOfferBar();
  const _chk=document.getElementById('confirmChk'); if(_chk){ const done=alreadySubmitted(); _chk.checked=done; if(done) setOrderMsg('✓ Pedido registrado. Continúa por WhatsApp 👇','ok'); else if((document.getElementById('orderMsg')||{}).className!=='order-msg err') setOrderMsg('',''); }
}
function openCart(){ document.getElementById('overlay').classList.add('on'); document.getElementById('drawer').classList.add('on'); }
function closeCart(){ document.getElementById('overlay').classList.remove('on'); document.getElementById('drawer').classList.remove('on'); }
document.getElementById('cartBtn').onclick=openCart;
document.getElementById('closeCart').onclick=closeCart;
document.getElementById('overlay').onclick=closeCart;
function orderSig(){ const r=computeCart(); return JSON.stringify(cart.map(i=>[i.id,i.tamano,i.qty]))+'|'+r.total; }
function alreadySubmitted(){ try{ return localStorage.getItem('bp_order_sig')===orderSig(); }catch(e){ return false; } }
function markSubmitted(){ try{ localStorage.setItem('bp_order_sig',orderSig()); }catch(e){} }
function setOrderMsg(t,cls){ const el=document.getElementById('orderMsg'); if(el){ el.textContent=t; el.className='order-msg '+(cls||''); } }
async function submitPedido(origen){
  if(!cart.length) return {ok:false};
  if(alreadySubmitted()) return {ok:true,dup:true};
  const r=computeCart();
  const items=r.lines.map(l=>({nombre:l.nombre,tamano:l.tamano,cantidad:l.qty,precio:l.unit,subtotal:l.lineTotal,promo:l.promo||null}));
  const combos=r.comboDisc.map(c=>({nombre:c.nombre,packs:c.packs,monto:c.monto}));
  const payload={ estado:'pendiente', origen, tipo:r.mayor?'mayorista':'minorista', items, combos, total:r.total,
    cliente:(document.getElementById('cName').value||'').trim()||null, telefono:(document.getElementById('cPhone').value||'').trim()||null };
  try{ const {error}=await sb.from('ventas').insert(payload); if(error) return {ok:false,error:error.message}; markSubmitted(); return {ok:true}; }
  catch(e){ return {ok:false,error:String(e)}; }
}
document.getElementById('confirmChk').onchange=async(e)=>{
  if(!e.target.checked){ setOrderMsg('',''); return; }
  if(!cart.length){ e.target.checked=false; toast('Tu carrito está vacío'); return; }
  setOrderMsg('Registrando pedido…','');
  const res=await submitPedido('confirmacion');
  if(res.ok){ setOrderMsg(res.dup?'Tu pedido ya estaba registrado. Continúa por WhatsApp 👇':'✓ ¡Pedido registrado! Ahora escríbenos por WhatsApp para coordinar 👇','ok'); }
  else { e.target.checked=false; setOrderMsg('No se pudo registrar ('+(res.error||'reintenta')+'). Igual puedes pedir por WhatsApp.','err'); }
};
document.getElementById('waBtn').onclick=async()=>{
  if(!cart.length) return;
  const r=computeCart();
  submitPedido('whatsapp');
  const nombre=document.getElementById('cName').value.trim();
  const tel=document.getElementById('cPhone').value.trim();
  let msg=`*Nuevo pedido — ${CONFIG.TIENDA_NOMBRE}*${r.mayor?' (precio por mayor)':''}\n\n`;
  r.lines.forEach(l=>{ msg+=`• ${l.qty}× ${l.nombre}${l.tamano&&l.tamano!=='Sellado'?` (${l.tamano})`:''} — ${money(l.lineTotal)}${l.promo?' ['+l.promo+']':''}\n`; });
  r.comboDisc.forEach(c=>{ msg+=`🎁 ${c.nombre}: - ${money(c.monto)}\n`; });
  msg+=`\n*Total: ${money(r.total)}*`;
  if(nombre) msg+=`\n\nCliente: ${nombre}`;
  if(tel) msg+=`\nWhatsApp: ${tel}`;
  window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');
};

let t; document.getElementById('search').oninput=e=>{ clearTimeout(t); t=setTimeout(()=>{ q=e.target.value.toLowerCase().trim(); render(); },180); };
document.getElementById('sort').onchange=render;
let tt; function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('on'); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('on'),1800); }
async function refreshStock(){
  const dr=document.getElementById('drawer'), md=document.getElementById('modal');
  if((dr&&dr.classList.contains('on'))||(md&&md.classList.contains('on'))) return;
  const { data, error } = await sb.from('productos').select('*');
  if(error||!data) return;
  PRODUCTS=data.filter(p=>p.visible!==false && presActivas(p).length>0);
  render();
}
setInterval(refreshStock,60000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refreshStock(); });

function pmNoteText(){ return PRICE_MODE==='may' ? `Estos precios se aplican al llevar ${MAYOR_MIN} o más` : `Llevando ${MAYOR_MIN} o más obtienes precio por mayor`; }
function setMode(m){ if(PRICE_MODE===m) return; PRICE_MODE=m; document.querySelectorAll('.pm-btn').forEach(b=>b.classList.toggle('on',b.dataset.mode===m)); document.getElementById('pmNote').textContent=pmNoteText(); render(); if(document.getElementById('modal').classList.contains('on')&&modalProd) openModal(modalProd.id); }
document.getElementById('pmMin').onclick=()=>setMode('min');
document.getElementById('pmMay').onclick=()=>setMode('may');
document.getElementById('pmMin').textContent=CONFIG.LABEL_MINORISTA||'Minorista';
document.getElementById('pmMay').textContent=CONFIG.LABEL_MAYORISTA||'Mayorista';
document.getElementById('pmNote').textContent=pmNoteText();
renderCart(); load();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; const b=document.getElementById('installBtn'); if(b) b.style.display='inline-flex'; });
{ const _ib=document.getElementById('installBtn'); if(_ib) _ib.onclick=async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; _ib.style.display='none'; }; }
window.addEventListener('appinstalled',()=>{ const b=document.getElementById('installBtn'); if(b) b.style.display='none'; });
</script>
</body>
